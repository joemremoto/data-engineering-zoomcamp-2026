name: Auto Approve PRs from Trusted Authors

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    
    # Only run if PR is from joemremoto or JosephRemotoGit
    if: |
      github.event.pull_request.user.login == 'joemremoto' ||
      github.event.pull_request.user.login == 'JosephRemotoGit'
    
    steps:
      - name: Auto approve PR
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Add comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Auto-approved by workflow (trusted author)'
            })
